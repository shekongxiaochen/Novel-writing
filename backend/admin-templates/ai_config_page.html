<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 配置 — {{ admin_title }}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/admin/_static/admin.css" />
</head>
<body class="bg-zinc-50 text-zinc-900 antialiased font-sans min-h-screen">
  <header class="border-b border-zinc-200 bg-white">
    <div class="max-w-3xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/admin/" class="text-zinc-500 hover:text-zinc-900 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i>控制台</a>
        <span class="text-zinc-300">/</span>
        <span class="text-sm font-semibold">AI 配置</span>
      </div>
      <span class="text-xs text-zinc-500">{{ admin_title }}</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-8 space-y-6">
    {% if saved %}
    <div class="px-4 py-3 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm flex items-center gap-2">
      <i class="fa-solid fa-circle-check"></i> 配置已保存。
    </div>
    {% endif %}
    {% if test_ok %}
    <div class="px-4 py-3 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm">{{ test_ok }}</div>
    {% endif %}
    {% if error %}
    <div class="px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/ai-config" class="space-y-6" id="ai-config-form">
      <section class="bg-white rounded-lg border border-zinc-200 shadow-sm p-6 space-y-4">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <i class="fa-solid fa-plug text-zinc-400"></i> DeepSeek 连接
        </h2>
        <p class="text-sm text-zinc-500">密钥仅存服务器，用户端不可见。可先填密钥后点「测试连接」。</p>

        <label class="block space-y-1">
          <span class="text-sm font-medium">API 密钥</span>
          <input name="deepseek_api_key" type="password" autocomplete="new-password"
                 placeholder="{{ api_key_placeholder }}"
                 class="w-full rounded-md border-zinc-200 text-sm" />
        </label>

        <label class="block space-y-1">
          <span class="text-sm font-medium">API 地址</span>
          <input name="deepseek_base_url" type="url" required value="{{ deepseek_base_url }}"
                 class="w-full rounded-md border-zinc-200 text-sm" />
        </label>

        <label class="block space-y-1">
          <span class="text-sm font-medium">模型 ID</span>
          <input name="deepseek_model" type="text" required value="{{ deepseek_model }}"
                 placeholder="deepseek-chat"
                 class="w-full rounded-md border-zinc-200 text-sm" />
        </label>

        <button type="submit" formaction="/admin/ai-config/test" formmethod="post"
                class="inline-flex items-center gap-2 border border-zinc-300 rounded-md px-4 py-2 text-sm font-medium hover:bg-zinc-50">
          <i class="fa-solid fa-satellite-dish"></i> 测试连接
        </button>
      </section>

      <section class="bg-white rounded-lg border border-zinc-200 shadow-sm p-6 space-y-4">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <i class="fa-solid fa-gauge-high text-zinc-400"></i> 消耗倍率
        </h2>
        <p class="text-sm text-zinc-500">
          每次扣费 =（输入 token×输入单价 + 输出 token×输出单价）/ 百万 × <strong>消耗倍率</strong>（单位：元）。
          ×1 按真实 API 成本扣余额；×2 扣双倍。用户端不展示倍率与单价。
        </p>

        <label class="block space-y-1">
          <span class="text-sm font-medium">输入单价（元 / 百万 token）</span>
          <input name="price_per_1m_input_tokens" type="number" step="0.0001" min="0" required
                 value="{{ price_per_1m_input_yuan }}"
                 class="w-full max-w-xs rounded-md border-zinc-200 text-sm" />
        </label>

        <label class="block space-y-1">
          <span class="text-sm font-medium">输出单价（元 / 百万 token）</span>
          <input name="price_per_1m_output_tokens" type="number" step="0.0001" min="0" required
                 value="{{ price_per_1m_output_yuan }}"
                 class="w-full max-w-xs rounded-md border-zinc-200 text-sm" />
        </label>

        <label class="block space-y-1">
          <span class="text-sm font-medium">消耗倍率</span>
          <input name="consumption_multiplier" type="number" step="0.1" min="0.1" max="10" required
                 value="{{ consumption_multiplier }}"
                 class="w-full max-w-xs rounded-md border-zinc-200 text-sm" />
        </label>
      </section>

      <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-zinc-900 text-white rounded-md px-5 py-2.5 text-sm font-semibold hover:bg-zinc-800">
          保存配置
        </button>
        <a href="/admin/" class="text-sm text-zinc-500 hover:text-zinc-800">返回</a>
      </div>
    </form>
  </main>
</body>
</html>
