events {
    worker_connections 4096;
}

http {
    upstream backend {
        server backend:8080;
        keepalive 64;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # 与后端 16MB body limit 对齐（快照/正文上传）
    client_max_body_size 16M;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # 限流：按客户端 IP，保护登录/兑换/AI 调用免遭脚本刷
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # ===== HTTP：仅用于 ACME 验证 + 强制跳 HTTPS =====
    server {
        listen 80;
        server_name _;

        # Let's Encrypt / certbot 验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== HTTPS：正式服务 =====
    server {
        listen 443 ssl;
        http2 on;
        # ↓↓↓ 部署时把 your-domain.com 改成你的真实域名
        server_name your-domain.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全响应头
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        location /health {
            access_log off;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # AI 流式接口（SSE）：必须关闭缓冲，否则流式输出会被 nginx 攒着不下发
        location ~ ^/ai/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;          # 关键：SSE 流式不缓冲
            proxy_cache off;
            proxy_read_timeout 300s;      # AI 生成可能较久
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # 其它 API
        location / {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
