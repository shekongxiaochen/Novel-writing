name: Build All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri (Windows nsis)
        working-directory: frontend
        run: npx tauri build --bundles nsis

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find frontend/src-tauri/target/release/bundle/nsis -name "*.exe" -exec cp {} dist-artifacts/ \;
          ls -lh dist-artifacts/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumen-windows
          path: dist-artifacts/

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            xdg-utils

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri (Linux deb + appimage)
        working-directory: frontend
        run: npx tauri build --bundles deb,appimage

      - name: Collect artifacts
        run: |
          mkdir -p dist-artifacts
          find frontend/src-tauri/target/release/bundle/deb -name "*.deb" -exec cp {} dist-artifacts/ \;
          find frontend/src-tauri/target/release/bundle/appimage -name "*.AppImage" -exec cp {} dist-artifacts/ \;
          ls -lh dist-artifacts/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumen-linux
          path: dist-artifacts/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri (macOS dmg - Apple Silicon)
        working-directory: frontend
        run: npx tauri build --bundles dmg --target aarch64-apple-darwin

      - name: Build Tauri (macOS dmg - Intel)
        working-directory: frontend
        run: npx tauri build --bundles dmg --target x86_64-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p dist-artifacts
          find frontend/src-tauri/target -name "*.dmg" -exec cp {} dist-artifacts/ \;
          ls -lh dist-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumen-macos
          path: dist-artifacts/
