name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri (macOS dmg)
        working-directory: frontend
        run: npx tauri build --bundles dmg

      - name: List all bundle output
        run: find frontend/src-tauri/target -type f \( -name "*.dmg" -o -name "*.app" -o -name "*.pkg" \) | head -30

      - name: Collect artifacts
        run: |
          mkdir -p macos-artifacts
          find frontend/src-tauri/target -name "*.dmg" -exec cp {} macos-artifacts/ \;
          ls -lh macos-artifacts/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumen-macos
          path: macos-artifacts/
