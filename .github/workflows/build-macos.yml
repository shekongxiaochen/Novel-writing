name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri (macOS universal)
        working-directory: frontend
        run: npx tauri build --target universal-apple-darwin

      - name: List build output
        run: find frontend/src-tauri/target -name "*.dmg" -o -name "*.app" | head -20

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumen-macos
          path: |
            frontend/src-tauri/target/**/bundle/dmg/*.dmg
            frontend/src-tauri/target/**/bundle/macos/*.app
